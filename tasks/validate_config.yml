---
- name: Fail if required Vector settings not defined
  ansible.builtin.fail:
    msg: >-
      You need to define a required configuration setting (`{{ item }}`).
  when: "lookup('vars', item, default='') | string | length == 0"
  with_items:
    - vector_uid
    - vector_gid

- name: Fail if Vector architecture is not supported
  ansible.builtin.fail:
    msg: >-
      Your configuration specifies a CPU architecture (`{{ vector_arch }}`) which is not currently supported.
      This Vector role also does not support self-building yet, so it's not possible to make use of it.
  when: "vector_arch not in ['amd64', 'arm64']"

- name: Fail if Vector journald source is enabled on an image without journalctl
  ansible.builtin.fail:
    msg: >-
      You have enabled `vector_journald_source_enabled`, but
      `vector_container_image_distribution` is set to `{{ vector_container_image_distribution }}`.
      Vector's `journald` source shells out to the `journalctl` binary, which is only
      bundled in the `debian` image variant. Set `vector_container_image_distribution: debian`
      (or mount a `journalctl` binary yourself and override the source's `journalctl_path`).
  when: "vector_journald_source_enabled | bool and vector_container_image_distribution != 'debian'"

- name: Validate Vector Traefik configuration
  when: vector_container_labels_traefik_enabled | bool
  block:
    - name: Fail if Traefik settings required for Vector are not defined
      ansible.builtin.fail:
        msg: >-
          You need to define a required configuration setting (`{{ item }}`).
      when: "lookup('vars', item, default='') | string | length == 0"
      with_items:
        - vector_hostname
        - vector_container_labels_traefik_hostname
        - vector_container_labels_traefik_path_prefix

    - name: Fail if Vector Traefik basic auth is enabled without defined users
      ansible.builtin.fail:
        msg: >-
          You have enabled `vector_container_labels_api_middleware_basic_auth_enabled`,
          so you need to define `vector_container_labels_api_middleware_basic_auth_users`.
      when: "vector_container_labels_api_middleware_basic_auth_enabled | bool and vector_container_labels_api_middleware_basic_auth_users | length == 0"

    # We ensure it doesn't end with a slash, because we handle both (slash and no-slash).
    # Knowing that `vector_container_labels_traefik_path_prefix` does not end with a slash
    # ensures we know how to set these routes up without having to do "does it end with a slash" checks elsewhere.
    - name: Fail if vector_container_labels_traefik_path_prefix ends with a slash
      ansible.builtin.fail:
        msg: >-
          vector_container_labels_traefik_path_prefix (`{{ vector_container_labels_traefik_path_prefix }}`) must either be `/` or not end with a slash (e.g. `/vector`).
      when: "vector_container_labels_traefik_path_prefix != '/' and vector_container_labels_traefik_path_prefix[-1] == '/'"
