---

# Project source code URL: https://github.com/vectordotdev/vector

vector_enabled: true

vector_identifier: vector
vector_base_path: "/{{ vector_identifier }}"
vector_data_path: "{{ vector_base_path }}/data"

vector_uid: ""
vector_gid: ""

# renovate: datasource=docker depName=timberio/vector versioning=semver
vector_version: 0.56.0
vector_arch: amd64

# The Vector image distribution variant to use.
# One of: debian, alpine, distroless-libc, distroless-static
vector_container_image_distribution: debian

# The hostname at which Vector's API is served (only relevant when exposing
# the API via a reverse proxy such as Traefik).
vector_hostname: ""

# The path at which Vector is served behind a reverse proxy.
# This value must either be `/` or not end with a slash (e.g. `/vector`).
vector_path_prefix: /

# Controls Vector's log verbosity by setting the `VECTOR_LOG` environment variable.
# When enabled, the log level is raised to `debug`.
vector_debugging_enabled: false

# Controls Vector's GraphQL API.
#
# The API is disabled by default (matching Vector's upstream default).
# When enabled, Vector exposes an HTTP `/health` endpoint, a GraphQL endpoint,
# and an interactive `/playground`. It powers `vector top`/`vector tap`.
#
# The API has no authentication of its own. When exposing it, secure it via a
# reverse proxy (see `vector_container_labels_api_middleware_basic_auth_*`).
vector_api_enabled: false

vector_container_image: "{{ vector_container_image_registry_prefix }}timberio/vector:{{ vector_container_image_tag }}"
vector_container_image_tag: "{{ vector_version }}-{{ vector_container_image_distribution }}"
vector_container_image_registry_prefix: "{{ vector_container_image_registry_prefix_upstream }}"
vector_container_image_registry_prefix_upstream: "{{ vector_container_image_registry_prefix_upstream_default }}"
vector_container_image_registry_prefix_upstream_default: docker.io/

# The base container network. It will be auto-created by this role if it doesn't exist already.
vector_container_network: "{{ vector_identifier }}"

# Control if the container network is deleted on uninstalling.
vector_container_network_deletion_enabled: true

# A list of additional container networks that the container would be connected to.
# The role does not create these networks, so make sure they already exist.
vector_container_additional_networks: "{{ (vector_container_additional_networks_default + vector_container_additional_networks_auto + vector_container_additional_networks_custom) | unique }}"
vector_container_additional_networks_default: []
vector_container_additional_networks_auto: []
vector_container_additional_networks_custom: []

# List of systemd services that the Vector systemd service depends on
vector_systemd_required_services_list: "{{ (vector_systemd_required_services_list_default + vector_systemd_required_services_list_auto + vector_systemd_required_services_list_custom) | unique }}"
vector_systemd_required_services_list_default: "{{ [devture_systemd_docker_base_docker_service_name] if devture_systemd_docker_base_docker_service_name else [] }}"
vector_systemd_required_services_list_auto: []
vector_systemd_required_services_list_custom: []

# List of systemd services that the Vector systemd service wants
vector_systemd_wanted_services_list: "{{ (vector_systemd_wanted_services_list_default + vector_systemd_wanted_services_list_auto + vector_systemd_wanted_services_list_custom) | unique }}"
vector_systemd_wanted_services_list_default: []
vector_systemd_wanted_services_list_auto: []
vector_systemd_wanted_services_list_custom: []

# The port Vector's API listens on inside the container.
vector_container_api_port: 8686

# Controls whether the container exposes the API port on the host.
# Can be used to access the API/playground directly (bypassing Traefik).
#
# Takes an "<ip>:<port>" or "<port>" value (e.g. "127.0.0.1:8686"), or empty string to not expose.
vector_container_api_bind_port: ""

# vector_container_labels_traefik_enabled controls whether labels to assist a Traefik reverse-proxy will be attached to the container.
# See `../templates/labels.j2` for details.
#
# To inject your own other container labels, see `vector_container_labels_additional_labels`.
vector_container_labels_traefik_enabled: false
vector_container_labels_traefik_docker_network: "{{ vector_container_network }}"
vector_container_labels_traefik_hostname: "{{ vector_hostname }}"
# The path prefix must either be `/` or not end with a slash (e.g. `/vector`).
vector_container_labels_traefik_path_prefix: "{{ vector_path_prefix }}"
vector_container_labels_traefik_rule: "Host(`{{ vector_container_labels_traefik_hostname }}`){% if vector_container_labels_traefik_path_prefix != '/' %} && PathPrefix(`{{ vector_container_labels_traefik_path_prefix }}`){% endif %}"
vector_container_labels_traefik_priority: 0
vector_container_labels_traefik_entrypoints: web-secure
vector_container_labels_traefik_tls: "{{ vector_container_labels_traefik_entrypoints != 'web' }}"
vector_container_labels_traefik_tls_certResolver: default  # noqa var-naming

# Controls whether a Traefik basic-auth middleware is attached to the API router.
# As Vector's API has no authentication of its own, enabling basic auth is strongly
# recommended whenever the API is exposed publicly.
#
# See: https://doc.traefik.io/traefik/reference/routing-configuration/http/middlewares/basicauth/
vector_container_labels_api_middleware_basic_auth_enabled: false
# A comma-separated list of `user:hashed-password` entries (htpasswd format).
vector_container_labels_api_middleware_basic_auth_users: ""

# vector_container_labels_additional_labels contains a multiline string with additional labels to add to the container label file.
# See `../templates/labels.j2` for details.
#
# Example:
# vector_container_labels_additional_labels: |
#   my.label=1
#   another.label="here"
vector_container_labels_additional_labels: ""

# vector_environment_variables_additional_variables contains a multiline string with additional environment variables to pass to the container.
#
# Example:
# vector_environment_variables_additional_variables: |
#   VAR=1
#   ANOTHER=value
vector_environment_variables_additional_variables: ""

# A list of additional "volumes" to mount in the container.
#
# See the `--mount` documentation for the `docker run` command.
#
# This list is assembled from 3 parts:
# - `_default` is populated automatically based on the enabled built-in log sources
#   (journald/varlog), so you usually don't need to touch it.
# - `_auto` is reserved for other roles to inject mounts programmatically.
# - `_custom` is where you add your own mounts.
#
# Example:
# vector_container_additional_volumes_custom:
#   - type: bind
#     src: /path/on/the/host
#     dst: /data
#   - type: bind
#     src: /another-path/on/the/host
#     dst: /read-only
#     options: readonly
vector_container_additional_volumes: "{{ vector_container_additional_volumes_default + vector_container_additional_volumes_auto + vector_container_additional_volumes_custom }}"
vector_container_additional_volumes_default: "{{ (vector_journald_source_additional_volumes if vector_journald_source_enabled else []) + (vector_varlog_source_additional_volumes if vector_varlog_source_enabled else []) }}"
vector_container_additional_volumes_auto: []
vector_container_additional_volumes_custom: []

# A list of extra arguments to pass to the container
vector_container_extra_arguments: []

# The directory (inside the container) where Vector persists state and buffers data.
vector_data_dir: /var/lib/vector

# The Vector pipeline is described by 3 maps: sources, transforms and sinks.
# Each is assembled from an `_auto` map (sane role defaults) and a `_custom` map
# (your additions/overrides), merged with `combine`.
#
# The default pipeline collects host metrics and Vector's own internal logs and
# writes them as JSON to the console (captured by journald: `journalctl -u vector`).
# Replace the `_custom` maps (or override `_auto`) to build your own pipeline.
#
# See: https://vector.dev/docs/reference/configuration/
vector_sources: "{{ vector_sources_auto | combine(vector_sources_custom) }}"
# `vector_sources_auto` starts from a base set of sources and conditionally merges in
# the built-in journald/varlog sources when their toggles are enabled (see below).
vector_sources_auto: "{{ vector_sources_auto_base | combine(vector_journald_source_config if vector_journald_source_enabled else {}) | combine(vector_varlog_source_config if vector_varlog_source_enabled else {}) }}"
vector_sources_auto_base:
  host_metrics:
    type: host_metrics
  internal_logs:
    type: internal_logs
  internal_metrics:
    type: internal_metrics
vector_sources_custom: {}

vector_transforms: "{{ vector_transforms_auto | combine(vector_transforms_custom) }}"
# `vector_transforms_auto` starts from a base set of transforms and conditionally merges
# in the built-in journald labeling transform (see the host-log sources section) when
# the journald source is enabled.
vector_transforms_auto: "{{ vector_transforms_auto_base | combine(vector_journald_labels_transform_config if vector_journald_source_enabled else {}) }}"
vector_transforms_auto_base: {}
vector_transforms_custom: {}

vector_sinks: "{{ vector_sinks_auto | combine(vector_sinks_custom) }}"
vector_sinks_auto:
  console:
    type: console
    inputs:
      - internal_logs
    encoding:
      codec: json
vector_sinks_custom: {}

########################################################################
#                                                                      #
# Built-in host-log sources (journald / varlog)                        #
#                                                                      #
########################################################################

# Vector normally runs as a non-root user with all Linux capabilities dropped
# (`--user=… --cap-drop=ALL`). Reading the host's root-owned systemd journal and
# `/var/log` files requires running as root and bypassing DAC permission checks, so
# enabling either built-in host-log source below automatically relaxes the container
# posture (runs as root and adds `DAC_OVERRIDE`/`DAC_READ_SEARCH`).
#
# When no host-log source is enabled, the hardened non-root posture is kept.
vector_container_run_as_non_root_user_enabled: "{{ not (vector_journald_source_enabled or vector_varlog_source_enabled) }}"
vector_container_capabilities_to_add: "{{ ['DAC_OVERRIDE', 'DAC_READ_SEARCH'] if (vector_journald_source_enabled or vector_varlog_source_enabled) else [] }}"

# journald source: ships the host's systemd journal to the Vector pipeline.
#
# Vector's `journald` source shells out to the `journalctl` binary, which is only
# present in the `debian` image variant (`vector_container_image_distribution`), not in
# the alpine/distroless variants. `validate_config.yml` enforces this.
#
# When enabled, this wires up two components:
#   - a `journald` source (internally named `journald_source`) that reads the journal, and
#   - a `journald` remap transform that promotes useful journal fields (unit,
#     syslog_identifier, service_name) onto each event so they can be used as Loki labels.
# Reference `journald` in your sink `inputs` to consume the labeled stream.
vector_journald_source_enabled: false
vector_journald_source_host_path: /var/log/journal
vector_journald_source_in_container_path: /journal
vector_journald_source_additional_volumes:
  - {type: bind, src: "{{ vector_journald_source_host_path }}", dst: "{{ vector_journald_source_in_container_path }}", options: readonly}
  - {type: bind, src: /etc/machine-id, dst: /etc/machine-id, options: readonly}
# Ship only entries from the current boot (plus all new ones as they arrive).
#
# Note: Vector rejects `current_boot_only: false` on systemd versions 250-257
vector_journald_source_current_boot_only: true
# Exclude Vector's own systemd unit to avoid a log feedback loop.
vector_journald_source_exclude_units:
  - "{{ vector_identifier }}"
vector_journald_source_config:
  journald_source:
    type: journald
    journal_directory: "{{ vector_journald_source_in_container_path }}"
    current_boot_only: "{{ vector_journald_source_current_boot_only }}"
    exclude_units: "{{ vector_journald_source_exclude_units }}"

# Built-in labeling transform applied to the journald stream. It promotes journal fields
# to clean, low-cardinality top-level fields (unit, syslog_identifier, service_name) so
# they can be mapped to Loki labels in your sink, which stops Loki from labeling
# everything `unknown_service`. The transform's component id is `journald` — the name you
# reference in your sink `inputs`.
#
# `service_name` is the field Grafana's service picker and Loki's service detection use;
# it falls back from the systemd unit to the syslog identifier (e.g. for kernel messages).
# The VRL below uses only infallible operations so it can never fail the pipeline.
vector_journald_labels_transform_config:
  journald:
    type: remap
    inputs:
      - journald_source
    source: |
      .unit = ._SYSTEMD_UNIT
      .syslog_identifier = .SYSLOG_IDENTIFIER
      .service_name = ._SYSTEMD_UNIT || .SYSLOG_IDENTIFIER || "journald"

# varlog source: ships textual log files found under `/var/log` to the pipeline.
#
# When enabled, a source named `varlog` is added; reference it in your sink `inputs`.
vector_varlog_source_enabled: false
vector_varlog_source_host_path: /var/log
vector_varlog_source_in_container_path: /varlog
vector_varlog_source_additional_volumes:
  - {type: bind, src: "{{ vector_varlog_source_host_path }}", dst: "{{ vector_varlog_source_in_container_path }}", options: readonly}
vector_varlog_source_include:
  - "{{ vector_varlog_source_in_container_path }}/**/*.log"
# Identify files by inode. Set to `checksum` for Vector's default.
vector_varlog_source_fingerprint:
  strategy: device_and_inode
vector_varlog_source_config:
  varlog:
    type: file
    include: "{{ vector_varlog_source_include }}"
    fingerprint: "{{ vector_varlog_source_fingerprint }}"

# Default Vector configuration template which covers the generic use case.
# You can customize it by controlling the various variables inside it.
#
# For a more advanced customization, you can extend the default (see `vector_configuration_extension_yaml`)
# or completely replace this variable with your own template.
vector_configuration_yaml: "{{ lookup('template', 'templates/config.yaml.j2') }}"

vector_configuration_extension_yaml: |
  # Your custom YAML configuration for Vector goes here.
  # This configuration extends the default starting configuration (`vector_configuration_yaml`).
  #
  # You can override individual variables from the default configuration, or introduce new ones.
  #
  # If you need something more special, you can take full control by
  # completely redefining `vector_configuration_yaml`.
  #
  # Example configuration extension follows:
  #
  # sinks:
  #   my_loki:
  #     type: loki
  #     inputs: [internal_logs]
  #     endpoint: https://loki.example.com

vector_configuration_extension: "{{ vector_configuration_extension_yaml | from_yaml if vector_configuration_extension_yaml | from_yaml is mapping else {} }}"

# Holds the final Vector configuration (a combination of the default and its extension).
# You most likely don't need to touch this variable. Instead, see `vector_configuration_yaml`.
vector_configuration: "{{ vector_configuration_yaml | from_yaml | combine(vector_configuration_extension, recursive=true) }}"

# Controls how long to wait for the container to stop gracefully before killing it.
vector_container_stop_grace_time_seconds: "{{ devture_systemd_docker_base_container_stop_grace_time_seconds }}"

# Controls how long the pre-start cleanup should wait for stale container-name release
# before failing startup explicitly.
vector_container_cleanup_timeout_seconds: "{{ devture_systemd_docker_base_container_cleanup_timeout_seconds }}"

# Controls the delay between pre-start cleanup retries.
vector_container_cleanup_retry_delay_seconds: "{{ devture_systemd_docker_base_container_cleanup_retry_delay_seconds }}"

# Shell command used in the systemd pre-start phase to deterministically remove a stale
# container and wait until Docker releases its name.
vector_container_cleanup_command: |
  i=0;
  while [ "$i" -lt {{ vector_container_cleanup_timeout_seconds }} ]; do
  {{ devture_systemd_docker_base_host_command_docker }} stop -t {{ vector_container_stop_grace_time_seconds }} {{ vector_identifier }} >/dev/null 2>&1 || true;
  {{ devture_systemd_docker_base_host_command_docker }} rm -f {{ vector_identifier }} >/dev/null 2>&1 || true;
  if {{ devture_systemd_docker_base_host_command_docker }} container inspect {{ vector_identifier }} >/dev/null 2>&1; then
  i=$((i + 1));
  sleep {{ vector_container_cleanup_retry_delay_seconds }};
  continue;
  fi;
  if {{ devture_systemd_docker_base_host_command_docker }} info >/dev/null 2>&1; then
  exit 0;
  fi;
  echo "Failed to query Docker daemon while cleaning up {{ vector_identifier }}" >&2;
  exit 1;
  done;
  echo "Failed to remove stale container {{ vector_identifier }} after {{ vector_container_cleanup_timeout_seconds }} attempts" >&2;
  exit 1

# vector_restart_necessary controls whether the Vector systemd
# service will be restarted (when true) or merely started (when false) by the
# systemd service manager role (when conditional restart is enabled).
#
# This value is automatically computed during installation based on whether
# any configuration files, the systemd service file, or the container image changed.
# The default of `false` means "no restart needed" — appropriate when the role's
# installation tasks haven't run (e.g., due to --tags skipping them).
vector_restart_necessary: false
