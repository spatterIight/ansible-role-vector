---
- name: Verify Vector systemd service
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Wait for Vector service to become active (up to 180s)
      ansible.builtin.systemd:
        name: vector.service
      register: vector_service
      until: vector_service.status.ActiveState == 'active'
      retries: 36
      delay: 5

    - name: Assert Vector service is active
      ansible.builtin.assert:
        that: vector_service.status.ActiveState == 'active'
        fail_msg: "vector.service not active ({{ vector_service.status.ActiveState }})"
        success_msg: "vector.service is active"

    - name: Wait for Vector HTTP endpoint to respond (up to 10m)
      ansible.builtin.uri:
        url: "http://localhost:3000/admin"
        method: GET
        status_code: [200, 302]
        follow_redirects: none
      register: vector_endpoint
      until: vector_endpoint.status in [200, 302]
      retries: 120
      delay: 5

    - name: Assert Vector HTTP endpoint responds
      ansible.builtin.assert:
        that: vector_endpoint.status in [200, 302]
        fail_msg: "Vector did not respond as expected ({{ vector_endpoint.status | default('no response') }})"
        success_msg: "Vector responded with {{ vector_endpoint.status }}"

    - name: Show Vector systemd service status summary
      ansible.builtin.debug:
        msg:
          - "Vector systemd: {{ vector_service.status.ActiveState }}"
          - "Vector HTTP: {{ vector_endpoint.status }}"
